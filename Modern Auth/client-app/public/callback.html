<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth Callback</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="callback-container">
        <div class="loader" id="loader">
          <div class="spinner"></div>
          <h2>Completing Authentication...</h2>
          <p id="statusText">Exchanging authorization code for tokens</p>
        </div>

        <div class="error-container" id="errorContainer" style="display: none">
          <div class="error-icon">❌</div>
          <h2>Authentication Failed</h2>
          <p id="errorText"></p>
          <button class="btn-primary" onclick="window.location.href = '/'">
            Try Again
          </button>
        </div>

        <div
          class="success-container"
          id="successContainer"
          style="display: none"
        >
          <div class="success-icon">✅</div>
          <h2>Authentication Successful!</h2>
          <p>Redirecting to dashboard...</p>
        </div>

        <!-- Debug Info (helpful for learning) -->
        <div class="debug-section" id="debugSection" style="display: none">
          <h3>🔍 OAuth Debug Info</h3>
          <div class="debug-item">
            <strong>Authorization Code:</strong>
            <code id="debugCode">-</code>
          </div>
          <div class="debug-item">
            <strong>PKCE Verifier:</strong>
            <code id="debugVerifier">-</code>
          </div>
          <div class="debug-item">
            <strong>State Match:</strong>
            <code id="debugState">-</code>
          </div>
        </div>
      </div>
    </div>

    <script src="/src/js/pkce.js"></script>
    <script src="/src/js/storage.js"></script>
    <script src="/src/js/auth.js"></script>
    <script>
      // This page handles the OAuth callback
      // Similar to how your Basic Auth POST /login redirects to dashboard
      // But here we need to exchange the authorization code for tokens

      window.onload = async () => {
        const debugSection = document.getElementById("debugSection");
        const loader = document.getElementById("loader");
        const errorContainer = document.getElementById("errorContainer");
        const successContainer = document.getElementById("successContainer");
        const statusText = document.getElementById("statusText");

        try {
          // Parse URL parameters
          const urlParams = new URLSearchParams(window.location.search);
          const code = urlParams.get("code");
          const state = urlParams.get("state");
          const error = urlParams.get("error");

          // Show debug info
          debugSection.style.display = "block";
          document.getElementById("debugCode").textContent = code
            ? code.substring(0, 20) + "..."
            : "None";

          // Check for errors from auth server
          if (error) {
            throw new Error(urlParams.get("error_description") || error);
          }

          // Validate authorization code
          if (!code) {
            throw new Error("No authorization code received");
          }

          // Validate state (CSRF protection)
          const savedState = sessionStorage.getItem("oauth_state");
          const stateMatch = state === savedState;
          document.getElementById("debugState").textContent = stateMatch
            ? "✅ Valid"
            : "❌ Mismatch";

          if (!stateMatch) {
            throw new Error("State mismatch - possible CSRF attack");
          }

          // Get PKCE code_verifier from storage
          const codeVerifier = sessionStorage.getItem("pkce_code_verifier");
          document.getElementById("debugVerifier").textContent = codeVerifier
            ? codeVerifier.substring(0, 20) + "..."
            : "None";

          if (!codeVerifier) {
            throw new Error("PKCE code_verifier not found");
          }

          // Exchange code for tokens
          statusText.textContent =
            "Exchanging code for tokens (with PKCE verification)...";

          const tokens = await OAuth.exchangeCodeForTokens(code, codeVerifier);

          // Store tokens
          TokenStorage.saveTokens(tokens);

          // Clean up session storage
          sessionStorage.removeItem("oauth_state");
          sessionStorage.removeItem("pkce_code_verifier");
          sessionStorage.removeItem("pkce_code_challenge");

          // Show success and redirect
          loader.style.display = "none";
          successContainer.style.display = "block";

          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1500);
        } catch (error) {
          console.error("OAuth callback error:", error);
          loader.style.display = "none";
          document.getElementById("errorText").textContent = error.message;
          errorContainer.style.display = "block";
        }
      };
    </script>
  </body>
</html>
